name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  check-release:
    name: check release
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check release
        run: python .github/scripts/release.py check "${{ github.base_ref }}"

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/base
        with:
          ssh-key: ${{ secrets.HEGEL_DEPLOY_KEY }}

      - uses: extractions/setup-just@v2
      - uses: astral-sh/setup-uv@v6

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - run: just setup
      - run: just check

  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/base
        with:
          ssh-key: ${{ secrets.HEGEL_DEPLOY_KEY }}

      - uses: extractions/setup-just@v2
      - uses: astral-sh/setup-uv@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - run: just setup
      - run: pip install pytest
      - run: just conformance

  release:
    name: release
    if: github.event_name == 'push' && github.repository == 'antithesishq/hegel-go'
    needs: [check, conformance]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for RELEASE.md
        id: check
        run: |
          if [ ! -f RELEASE.md ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate app token
        if: steps.check.outputs.skip != 'true'
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ vars.HEGEL_RELEASE_APP_ID }}
          private-key: ${{ secrets.HEGEL_RELEASE_APP_PRIVATE_KEY }}

      - name: Re-checkout with app token
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Release
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: python .github/scripts/release.py release

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.23'

      - name: Install just
        run: sudo apt-get update && sudo apt-get install -y just

      - name: Lint
        run: just lint
      - name: Install zizmor
        run: pip install zizmor
      - name: Run zizmor
        run: zizmor --format plain .github/

  test:
    name: test
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed for ratchet auto-update
      pull-requests: write  # needed for creating PRs on main
    steps:
      # persist-credentials needed for git push in the auto-update step below
      # For fork PRs, head_ref points to a branch that doesn't exist on the base repo,
      # so we fall back to the default ref (the merge commit).
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 # zizmor: ignore[artipacked]
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        with:
          ref: ${{ github.head_ref || github.ref }}
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
        with:
          persist-credentials: false

      - uses: ./.github/actions/base
        with:
          ssh-key: ${{ secrets.HEGEL_DEPLOY_KEY }}

      - name: Install just
        run: sudo apt-get update && sudo apt-get install -y just
      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.23'

      - name: Run tests
        run: just test

      - name: Auto-update coverage annotations and ratchet
        if: success() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet && git diff --quiet .github/coverage-ratchet.json; then
            echo "No coverage annotation changes needed"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -u
          git add .github/coverage-ratchet.json

          if git diff --cached --quiet; then
            exit 0
          fi

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git commit -m "Auto-update coverage annotations and ratchet"
            git push
          else
            BRANCH="auto/coverage-ratchet-update"
            git checkout -b "$BRANCH"
            git commit -m "Auto-update coverage annotations and ratchet"
            git push -f origin "$BRANCH"
            gh pr create \
              --title "Auto-update coverage ratchet" \
              --body "The coverage ratchet has tightened on main. This PR updates the ratchet file and removes unnecessary annotations." \
              --base main \
              --head "$BRANCH" || true
          fi

  docs:
    name: docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.23'

      - name: Install just
        run: sudo apt-get update && sudo apt-get install -y just

      - name: Check docs
        run: just check-docs

  conformance:
    name: conformance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: ./.github/actions/base
        with:
          ssh-key: ${{ secrets.HEGEL_DEPLOY_KEY }}

      - name: Install just
        run: sudo apt-get update && sudo apt-get install -y just
      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.23'

      - run: just conformance

  release:
    name: release
    if: github.event_name == 'push' && github.repository == 'hegeldev/hegel-go'
    needs: [lint, test, docs, conformance]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      checks: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Check for RELEASE.md
        id: check
        run: |
          if [ ! -f RELEASE.md ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate app token
        if: steps.check.outputs.skip != 'true'
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        id: app-token
        with:
          app-id: ${{ vars.HEGEL_RELEASE_APP_ID }}
          private-key: ${{ secrets.HEGEL_RELEASE_APP_PRIVATE_KEY }}

      - name: Re-checkout with app token # zizmor: ignore[artipacked]
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        if: steps.check.outputs.skip != 'true'
        with:
          go-version: '1.23'

      - name: Release
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          HEGEL_RELEASE_APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: python .github/scripts/release.py release

      # poke go proxy so it knows to index our new release
      # https://go.dev/doc/modules/publishing
      - name: Update Go module proxy
        if: steps.check.outputs.skip != 'true'
        run: |
          VERSION=$(git describe --tags --abbrev=0)
          GOPROXY=proxy.golang.org go list -m "hegel.dev/go/hegel@${VERSION}"

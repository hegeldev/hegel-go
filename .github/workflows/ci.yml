name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Check formatting
        run: test -z $(gofmt -l .)

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go test ./...

  conformance:
    name: Conformance tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HEGEL_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts
      - name: Install hegel
        run: |
          pip install git+ssh://git@github.com/antithesishq/hegel.git
          pip install pytest
      - name: Build conformance binaries
        working-directory: tests/conformance/go
        run: |
          mkdir -p bin
          go build -o bin/test_booleans ./cmd/test_booleans
          go build -o bin/test_integers ./cmd/test_integers
          go build -o bin/test_floats ./cmd/test_floats
          go build -o bin/test_text ./cmd/test_text
          go build -o bin/test_lists ./cmd/test_lists
          go build -o bin/test_sampled_from ./cmd/test_sampled_from
      - name: Run conformance tests
        working-directory: tests/conformance
        run: pytest test_conformance.py -v
